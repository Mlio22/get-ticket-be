services:
    # ── Databases ────────────────────────────────────────────────────
    postgres:
        image: postgres:16-alpine
        container_name: postgres
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./Data/Migrations:/docker-entrypoint-initdb.d
            - ./Auth/Data/Migrations:/auth-migrations
            - ./EventManagement/Data/Migrations:/eventmanagement-migrations
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: redis
        command: ["redis-server", "--appendonly", "yes"]
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    # ── Services ─────────────────────────────────────────────────────
    auth:
        build:
            context: .
            dockerfile: Auth/Dockerfile
        container_name: auth-service
        environment:
            ASPNETCORE_ENVIRONMENT: Production
            ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=auth_db;Username=postgres;Password=postgres"
            JwtSettings__SecretKey: "CHANGE_ME_TO_A_STRONG_SECRET_KEY_AT_LEAST_32_CHARS"
            JwtSettings__Issuer: "GetTicket"
            JwtSettings__Audience: "GetTicketClient"
            JwtSettings__ExpiryMinutes: "60"
        ports:
            - "5001:8080"
        depends_on:
            postgres:
                condition: service_healthy
        restart: unless-stopped

    eventmanagement:
        build:
            context: .
            dockerfile: EventManagement/Dockerfile
        container_name: eventmanagement-service
        environment:
            ASPNETCORE_ENVIRONMENT: Production
            ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=event_management_db;Username=postgres;Password=postgres"
            ConnectionStrings__AuthConnection: "Host=postgres;Port=5432;Database=auth_db;Username=postgres;Password=postgres"
            ConnectionStrings__Redis: "redis:6379"
            JwtSettings__SecretKey: "CHANGE_ME_TO_A_STRONG_SECRET_KEY_AT_LEAST_32_CHARS"
            JwtSettings__Issuer: "GetTicket"
            JwtSettings__Audience: "GetTicketClient"
            JwtSettings__ExpiryMinutes: "60"
            Checkout__HoldDurationMinutes: "15"
            Checkout__ExpirationSweepIntervalSeconds: "5"
            Checkout__ExpirationSweepBatchSize: "100"
            Xendit__BaseUrl: "https://api.xendit.co"
            Xendit__SecretKey: ""
            Xendit__WebhookToken: ""
            Xendit__InvoiceDurationSeconds: "900"
            Xendit__Currency: "IDR"
        ports:
            - "5002:8080"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped

volumes:
    postgres_data:
    redis_data:
